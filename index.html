<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Oila Moliyasi</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #1D9E75; --green-light: #E1F5EE; --green-dark: #0F6E56;
  --red: #D85A30; --red-light: #FAECE7; --red-dark: #993C1D;
  --purple: #7F77DD; --purple-light: #EEEDFE; --purple-dark: #534AB7;
  --gold: #BA7517; --gold-light: #FAEEDA; --gold-dark: #854F0B;
  --blue: #378ADD; --blue-light: #E6F1FB; --blue-dark: #185FA5;
  --pink: #D4537E; --pink-light: #FBEAF0; --pink-dark: #993556;
  --gray: #888780; --gray-light: #F1EFE8; --gray-dark: #444441;
  --text: #1a1a1a; --text-muted: #6b6b6b;
  --border: rgba(0,0,0,0.1); --bg: #f5f5f0; --card: #ffffff; --radius: 14px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px; }
.header { background: var(--card); padding: 16px; border-bottom: 0.5px solid var(--border); position: sticky; top: 0; z-index: 10; }
.header-top { display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 17px; font-weight: 600; }
.header p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
.sync-dot.live { background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.totals { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 12px 16px; }
.total-card { background: var(--card); border-radius: 12px; padding: 10px 12px; text-align: center; border: 0.5px solid var(--border); }
.total-card .lbl { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; }
.total-card .val { font-size: 13px; font-weight: 600; }
.val.green { color: var(--green); }
.val.red { color: var(--red); }

.section-title { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; padding: 8px 16px 6px; }
.buckets { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 16px 12px; }
.bucket-card { background: var(--card); border-radius: var(--radius); padding: 12px; border: 0.5px solid var(--border); position: relative; overflow: hidden; }
.bucket-card .b-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
.bucket-card .b-amount { font-size: 14px; font-weight: 600; }
.bucket-card .b-pct { font-size: 10px; margin-top: 4px; display: inline-block; padding: 2px 7px; border-radius: 20px; font-weight: 500; }

.actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px 12px; }
.btn-income { background: var(--green); color: white; border: none; border-radius: 12px; padding: 14px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
.btn-expense { background: var(--card); color: var(--red); border: 1.5px solid var(--red); border-radius: 12px; padding: 14px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }

.filter-bar { padding: 0 16px 10px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.filter-tabs { display: flex; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--card); }
.ftab { padding: 7px 14px; font-size: 12px; font-weight: 500; cursor: pointer; background: transparent; border: none; color: var(--text-muted); }
.ftab.active { background: var(--text); color: white; }
.date-inputs { display: flex; gap: 6px; align-items: center; flex: 1; }
.date-inputs input[type=date] { flex: 1; padding: 7px 8px; border: 1px solid var(--border); border-radius: 8px; font-size: 11px; background: var(--card); color: var(--text); min-width: 0; }
.btn-filter-clear { padding: 7px 10px; font-size: 11px; background: transparent; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; color: var(--text-muted); white-space: nowrap; }

.history-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 16px; }
.history-col-title { font-size: 12px; font-weight: 600; padding: 6px 0 8px; display: flex; align-items: center; gap: 5px; }
.history-col-title .dot { width: 8px; height: 8px; border-radius: 50%; }
.history-item { background: var(--card); border-radius: 10px; padding: 10px 12px; margin-bottom: 7px; border: 0.5px solid var(--border); }
.h-desc { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.h-meta { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.h-amount { font-size: 13px; font-weight: 600; margin-top: 4px; }
.h-amount.inc { color: var(--green); }
.h-amount.exp { color: var(--red); }
.empty-col { text-align: center; padding: 20px 8px; color: var(--text-muted); font-size: 12px; }

.col-sum { font-size: 12px; font-weight: 600; padding: 6px 10px; border-radius: 8px; margin-bottom: 8px; }
.col-sum.inc-sum { background: var(--green-light); color: var(--green-dark); }
.col-sum.exp-sum { background: var(--red-light); color: var(--red-dark); }

.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: var(--card); border-radius: 20px 20px 0 0; padding: 20px 16px 32px; width: 100%; max-width: 480px; }
.modal-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 16px; }
.modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 16px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
.form-group input, .form-group select { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 15px; background: var(--bg); color: var(--text); outline: none; }
.form-group input:focus, .form-group select:focus { border-color: var(--green); }
.breakdown-preview { background: var(--green-light); border-radius: 10px; padding: 12px; margin-bottom: 14px; font-size: 12px; color: #0F6E56; display: none; }
.breakdown-preview .bp-row { display: flex; justify-content: space-between; padding: 2px 0; }
.modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px; }
.btn-cancel-modal { padding: 13px; border: 1px solid var(--border); border-radius: 10px; background: transparent; font-size: 15px; cursor: pointer; color: var(--text); }
.btn-confirm-modal { padding: 13px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; color: white; }
.btn-confirm-modal.income-btn { background: var(--green); }
.btn-confirm-modal.expense-btn { background: var(--red); }

.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.3s; z-index: 200; white-space: nowrap; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>💰 Oila Moliyasi</h1>
      <p>Ibrahim Gulyamov metodikasi</p>
    </div>
    <div class="sync-dot" id="syncDot"></div>
  </div>
</div>

<div class="totals">
  <div class="total-card"><div class="lbl">Kirim</div><div class="val green" id="tIn">0</div></div>
  <div class="total-card"><div class="lbl">Chiqim</div><div class="val red" id="tOut">0</div></div>
  <div class="total-card"><div class="lbl">Qoldiq</div><div class="val" id="tBal">0</div></div>
</div>

<div class="actions">
  <button class="btn-income" onclick="openModal('income')">＋ Daromad</button>
  <button class="btn-expense" onclick="openModal('expense')">－ Xarajat</button>
</div>

<div class="section-title">Hisoblar holati</div>
<div class="buckets" id="bucketsGrid"></div>

<div class="section-title">Amaliyotlar tarixi</div>

<div class="filter-bar">
  <div class="filter-tabs">
    <button class="ftab active" onclick="setFilter('all',this)">Barchasi</button>
    <button class="ftab" onclick="setFilter('today',this)">Bugun</button>
    <button class="ftab" onclick="setFilter('week',this)">Hafta</button>
    <button class="ftab" onclick="setFilter('month',this)">Oy</button>
  </div>
</div>
<div class="filter-bar" style="padding-top:0;">
  <div class="date-inputs">
    <input type="date" id="dateFrom" onchange="applyDateFilter()" placeholder="dan">
    <span style="font-size:11px;color:var(--text-muted);">—</span>
    <input type="date" id="dateTo" onchange="applyDateFilter()" placeholder="gacha">
  </div>
  <button class="btn-filter-clear" onclick="clearDates()">✕ Tozala</button>
</div>

<div class="history-cols">
  <div>
    <div class="history-col-title"><span class="dot" style="background:var(--green)"></span> Tushum</div>
    <div class="col-sum inc-sum" id="incSum">0 so'm</div>
    <div id="incList"></div>
  </div>
  <div>
    <div class="history-col-title"><span class="dot" style="background:var(--red)"></span> Chiqim</div>
    <div class="col-sum exp-sum" id="expSum">0 so'm</div>
    <div id="expList"></div>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3 id="modalTitle">Daromad qo'shish</h3>
    <div class="form-group">
      <label>Tavsif</label>
      <input type="text" id="fDesc" placeholder="Masalan: Oy maoshi" />
    </div>
    <div class="form-group">
      <label>Summa (so'm)</label>
      <input type="number" id="fAmount" placeholder="0" oninput="updatePreview()" />
    </div>
    <div class="breakdown-preview" id="bPreview"></div>
    <div class="form-group" id="bucketGroup" style="display:none;">
      <label>Qaysi hisobdan?</label>
      <select id="fBucket"></select>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel-modal" onclick="closeModal()">Bekor qilish</button>
      <button class="btn-confirm-modal income-btn" id="confirmBtn" onclick="confirmTxn()">Tasdiqlash</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const FIREBASE_URL = 'https://oilamoliyasi-8f864-default-rtdb.asia-southeast1.firebasedatabase.app';
const app = initializeApp({ databaseURL: FIREBASE_URL }, 'oila');
const db = getDatabase(app);

const BUCKETS = [
  { id: 'safety',    label: 'Xavfsizlik yostiqchasi', pct: 0.10, color: '#378ADD', light: '#E6F1FB', dark: '#185FA5' },
  { id: 'charity',   label: 'Ehson',                  pct: 0.05, color: '#1D9E75', light: '#E1F5EE', dark: '#0F6E56' },
  { id: 'relax',     label: 'Maishiy hordiq',          pct: 0.05, color: '#D85A30', light: '#FAECE7', dark: '#993C1D' },
  { id: 'household', label: "Ro'zg'or",               pct: 0.40, color: '#888780', light: '#F1EFE8', dark: '#444441' },
  { id: 'capital',   label: 'Kapital/Investitsiya',   pct: 0.32, color: '#7F77DD', light: '#EEEDFE', dark: '#534AB7' },
  { id: 'dream_s',   label: 'Kichik orzular',          pct: 0.04, color: '#D4537E', light: '#FBEAF0', dark: '#993556' },
  { id: 'dream_b',   label: 'Katta orzular',           pct: 0.04, color: '#BA7517', light: '#FAEEDA', dark: '#854F0B' },
];

window.BUCKETS = BUCKETS;
let balances = {};
let allTxns = [];
let activeFilter = 'all';
let customFrom = null;
let customTo = null;
BUCKETS.forEach(b => balances[b.id] = 0);

function fmt(n) { return Math.round(n).toLocaleString('uz-UZ') + " so'm"; }
function fmtNum(n) { return Math.round(n).toLocaleString('uz-UZ'); }

function startOfDay(d) { const x = new Date(d); x.setHours(0,0,0,0); return x.getTime(); }
function endOfDay(d)   { const x = new Date(d); x.setHours(23,59,59,999); return x.getTime(); }

function getFilteredTxns() {
  const now = Date.now();
  let from = null, to = null;
  if (customFrom || customTo) {
    from = customFrom ? startOfDay(customFrom) : null;
    to   = customTo  ? endOfDay(customTo)   : null;
  } else if (activeFilter === 'today') {
    from = startOfDay(new Date()); to = endOfDay(new Date());
  } else if (activeFilter === 'week') {
    const d = new Date(); d.setDate(d.getDate() - 6);
    from = startOfDay(d); to = endOfDay(new Date());
  } else if (activeFilter === 'month') {
    const d = new Date(); d.setDate(1);
    from = startOfDay(d); to = endOfDay(new Date());
  }
  return allTxns.filter(h => {
    const ts = h.ts || 0;
    if (from && ts < from) return false;
    if (to   && ts > to)   return false;
    return true;
  });
}

function renderHistory() {
  const txns = getFilteredTxns().sort((a,b) => (b.ts||0)-(a.ts||0));
  const incTxns = txns.filter(h => h.type === 'income');
  const expTxns = txns.filter(h => h.type === 'expense');

  const incTotal = incTxns.reduce((s,h) => s+h.amount, 0);
  const expTotal = expTxns.reduce((s,h) => s+h.amount, 0);

  document.getElementById('incSum').textContent = fmt(incTotal);
  document.getElementById('expSum').textContent = fmt(expTotal);

  function timeStr(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return d.toLocaleDateString('uz-UZ', {day:'2-digit', month:'2-digit'}) + ' ' +
           d.toLocaleTimeString('uz-UZ', {hour:'2-digit', minute:'2-digit'});
  }

  const incList = document.getElementById('incList');
  if (incTxns.length === 0) {
    incList.innerHTML = '<div class="empty-col">Tushum yo\'q</div>';
  } else {
    incList.innerHTML = incTxns.map(h => `
      <div class="history-item">
        <div class="h-desc">${h.desc || 'Daromad'}</div>
        <div class="h-meta">${timeStr(h.ts)}</div>
        <div class="h-amount inc">+${fmtNum(h.amount)}</div>
      </div>`).join('');
  }

  const expList = document.getElementById('expList');
  if (expTxns.length === 0) {
    expList.innerHTML = '<div class="empty-col">Chiqim yo\'q</div>';
  } else {
    expList.innerHTML = expTxns.map(h => {
      const bkt = BUCKETS.find(b => b.id === h.bucket);
      return `
        <div class="history-item">
          <div class="h-desc">${h.desc || 'Xarajat'}</div>
          <div class="h-meta">${bkt ? bkt.label : ''} · ${timeStr(h.ts)}</div>
          <div class="h-amount exp">-${fmtNum(h.amount)}</div>
        </div>`;
    }).join('');
  }
}

function renderBuckets() {
  document.getElementById('bucketsGrid').innerHTML = BUCKETS.map(b => `
    <div class="bucket-card">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${b.color};border-radius:14px 14px 0 0;"></div>
      <div class="b-label">${b.label}</div>
      <div class="b-amount">${fmtNum(balances[b.id])}</div>
      <div class="b-pct" style="background:${b.light};color:${b.dark};">${Math.round(b.pct*100)}%</div>
    </div>`).join('');
}

function renderTotals() {
  const inc = allTxns.filter(h=>h.type==='income').reduce((s,h)=>s+h.amount,0);
  const exp = allTxns.filter(h=>h.type==='expense').reduce((s,h)=>s+h.amount,0);
  document.getElementById('tIn').textContent = fmtNum(inc);
  document.getElementById('tOut').textContent = fmtNum(exp);
  const bal = inc - exp;
  const el = document.getElementById('tBal');
  el.textContent = fmtNum(Math.abs(bal));
  el.style.color = bal >= 0 ? '#1D9E75' : '#D85A30';
}

const txnRef = ref(db, 'transactions');
onValue(txnRef, (snap) => {
  document.getElementById('syncDot').classList.add('live');
  balances = {}; allTxns = [];
  BUCKETS.forEach(b => balances[b.id] = 0);
  if (snap.exists()) {
    snap.forEach(child => {
      const d = child.val();
      allTxns.push(d);
      if (d.type === 'income') BUCKETS.forEach(b => { balances[b.id] += d.amount * b.pct; });
      else if (d.type === 'expense' && balances[d.bucket] !== undefined) balances[d.bucket] -= d.amount;
    });
  }
  renderBuckets(); renderHistory(); renderTotals();
});

window.setFilter = function(f, el) {
  activeFilter = f;
  customFrom = null; customTo = null;
  document.getElementById('dateFrom').value = '';
  document.getElementById('dateTo').value = '';
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderHistory();
};

window.applyDateFilter = function() {
  customFrom = document.getElementById('dateFrom').value || null;
  customTo   = document.getElementById('dateTo').value   || null;
  activeFilter = 'custom';
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  renderHistory();
};

window.clearDates = function() {
  customFrom = null; customTo = null;
  document.getElementById('dateFrom').value = '';
  document.getElementById('dateTo').value = '';
  activeFilter = 'all';
  document.querySelectorAll('.ftab')[0].classList.add('active');
  renderHistory();
};

let currentMode = 'income';
window.openModal = function(mode) {
  currentMode = mode;
  document.getElementById('modalTitle').textContent = mode === 'income' ? "Daromad qo'shish" : 'Xarajat kiritish';
  document.getElementById('fDesc').value = '';
  document.getElementById('fAmount').value = '';
  document.getElementById('bPreview').style.display = 'none';
  const bg = document.getElementById('bucketGroup');
  const confirmBtn = document.getElementById('confirmBtn');
  if (mode === 'expense') {
    bg.style.display = 'block';
    confirmBtn.className = 'btn-confirm-modal expense-btn';
    document.getElementById('fBucket').innerHTML = BUCKETS.map(b => `<option value="${b.id}">${b.label} — ${fmt(balances[b.id])}</option>`).join('');
  } else {
    bg.style.display = 'none';
    confirmBtn.className = 'btn-confirm-modal income-btn';
  }
  document.getElementById('modalBg').classList.add('open');
  setTimeout(() => document.getElementById('fDesc').focus(), 300);
};

window.closeModal = function() { document.getElementById('modalBg').classList.remove('open'); };

window.updatePreview = function() {
  const amt = parseFloat(document.getElementById('fAmount').value);
  const preview = document.getElementById('bPreview');
  if (!amt || currentMode !== 'income') { preview.style.display='none'; return; }
  preview.style.display = 'block';
  preview.innerHTML = BUCKETS.map(b => `<div class="bp-row"><span>${b.label}</span><span>${fmt(amt * b.pct)}</span></div>`).join('');
};

window.confirmTxn = async function() {
  const desc = document.getElementById('fDesc').value.trim() || (currentMode==='income'?'Daromad':'Xarajat');
  const amount = parseFloat(document.getElementById('fAmount').value);
  if (!amount || amount <= 0) { showToast('Summa kiriting!'); return; }
  if (currentMode === 'expense') {
    const bid = document.getElementById('fBucket').value;
    if (balances[bid] < amount) { showToast("Bu hisobda yetarli mablag' yo'q!"); return; }
    await push(txnRef, { type: 'expense', desc, amount, bucket: bid, ts: Date.now() });
    showToast('Xarajat kiritildi ✓');
  } else {
    await push(txnRef, { type: 'income', desc, amount, ts: Date.now() });
    showToast('Daromad taqsimlandi ✓');
  }
  closeModal();
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

document.getElementById('modalBg').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
</script>
</body>
</html>
